<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Tarot Reading · Three-Card & Celtic Cross | 塔罗占卜</title>
<meta name="description" content="Free online tarot reading. Draw a three-card or Celtic Cross spread from the full 78-card deck and optionally unlock a personalized AI interpretation.">
<link rel="canonical" href="https://oracleday.xyz/tarot.html">
<link rel="alternate" hreflang="en" href="https://oracleday.xyz/tarot.html">
<link rel="alternate" hreflang="zh" href="https://oracleday.xyz/tarot.html?lang=zh">
<link rel="alternate" hreflang="ja" href="https://oracleday.xyz/tarot.html?lang=ja">
<link rel="alternate" hreflang="ko" href="https://oracleday.xyz/tarot.html?lang=ko">
<link rel="alternate" hreflang="es" href="https://oracleday.xyz/tarot.html?lang=es">
<link rel="alternate" hreflang="fr" href="https://oracleday.xyz/tarot.html?lang=fr">
<link rel="alternate" hreflang="x-default" href="https://oracleday.xyz/tarot.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Free Tarot Reading · Three-Card & Celtic Cross">
<meta property="og:description" content="Draw a free 3-card or Celtic Cross spread and unlock an AI interpretation.">
<meta property="og:url" content="https://oracleday.xyz/tarot.html">
<meta property="og:image" content="https://oracleday.xyz/qtong.png">
<link rel="stylesheet" href="style.css?v=6">
</head>
<body class="tarot-page tarot-landing">

<select id="lang-select" class="lang-select" onchange="window.location.search='?lang='+this.value" aria-label="Select language">
  <option value="en">English</option>
  <option value="zh">中文</option>
</select>

<main class="tarot-main">
  <h1 id="page-title">Free Tarot Reading</h1>
  <p id="page-intro">Focus on your question, choose a spread, and draw from the full 78-card deck.</p>

  <form id="tarot-form" class="tarot-form">
    <label><span id="lbl-question">Your question</span>
      <textarea name="question" rows="2" maxlength="300" placeholder="What should I focus on right now?"></textarea>
    </label>
    <div class="tarot-spread-choice">
      <label><input type="radio" name="spread" value="three" checked><span id="lbl-three">Three-card (Past / Present / Future) — free draw, $0.99 AI reading</span></label>
      <label><input type="radio" name="spread" value="celtic"><span id="lbl-celtic">Celtic Cross (10 cards) — free draw, $4.99 AI reading</span></label>
    </div>
    <button type="submit" class="unlock-btn tarot-draw-btn"><span id="btn-draw">Draw cards</span></button>
  </form>

  <section id="tarot-result" class="tarot-result" hidden></section>

  <nav class="tarot-index" aria-label="All 78 tarot cards">
    <h2 id="index-title">All 78 cards</h2>
    <div class="tarot-index-groups">
      <div>
        <h3 id="grp-major">Major Arcana</h3>
        <ul id="list-major"></ul>
      </div>
      <div>
        <h3 id="grp-wands">Wands</h3><ul id="list-wands"></ul>
      </div>
      <div>
        <h3 id="grp-cups">Cups</h3><ul id="list-cups"></ul>
      </div>
      <div>
        <h3 id="grp-swords">Swords</h3><ul id="list-swords"></ul>
      </div>
      <div>
        <h3 id="grp-pentacles">Pentacles</h3><ul id="list-pentacles"></ul>
      </div>
    </div>
  </nav>
</main>

<script src="i18n-pages.js?v=1"></script>
<script src="site-nav.js?v=2"></script>
<script src="tarot.js?v=2"></script>
</body>
</html>
